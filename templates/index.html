{% extends "base.html" %}
{% block content %}
<style>
    /* Styling as we defined it */
    .hero-section {
        max-width: 1100px;
        margin: 0 auto;
        padding: 60px 24px;
        text-align: center;
    }

    .hero-title {
        font-size: 44px;
        font-weight: 800;
        color: var(--text-main);
        margin-bottom: 16px;
    }

    .hero-title span {
        color: var(--brand-gold);
    }

    .search-container {
        background-color: var(--bg-card);
        border: 1px solid var(--border-soft);
        border-radius: 24px;
        padding: 8px;
        display: flex;
        gap: 8px;
        max-width: 600px;
        margin: 0 auto 50px auto;
    }

    .search-input {
        flex-grow: 1;
        border: none;
        padding: 16px 20px;
        background: transparent;
        font-size: 15px;
        font-weight: 600;
        color: var(--text-main);
    }

    .search-button {
        background-color: var(--text-main);
        color: #fff;
        padding: 0 28px;
        border-radius: 18px;
        border: none;
        cursor: pointer;
        font-weight: 700;
    }

    .result-dashboard {
        display: none;
        background-color: var(--bg-card);
        border: 1px solid var(--border-soft);
        border-radius: 28px;
        max-width: 850px;
        margin: 0 auto;
        padding: 40px;
        text-align: left;
    }

    .result-layout {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 40px;
    }

    .player-panel {
        grid-column: span 2;
        margin-top: 30px;
        border-top: 1px solid var(--border-soft);
        text-align: center;
        padding-top: 20px;
        position: relative;
        z-index: 10;
    }

    .listen-btn {
        background-color: var(--brand-gold);
        color: white;
        padding: 14px 40px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 700;
        display: inline-block;
        position: relative;
        z-index: 100;
        cursor: pointer;
    }

    #hidden-player-container {
        opacity: 0;
        position: absolute;
        top: -9999px;
    }

    /* Default: link is hidden */
    #listen-link-container {
        margin-top: 15px;
        display: none;
    }
</style>

<div class="hero-section">
    <h1 class="hero-title">Discover Bollywood music, <span>reimagined by AI.</span></h1>
    <div class="search-container">
        <input type="text" id="user-prompt" class="search-input" placeholder="e.g. A melancholic drive...">
        <button class="search-button" onclick="getRecommendation()">Generate Vibe</button>
    </div>

    <div id="result-box" class="result-dashboard">
        <div class="result-layout">
            <div class="song-details-col">
                <div class="song-movie" id="song-movie">Movie Album</div>
                <h2 class="song-title" id="song-title">Song Title</h2>
                <div class="ai-explanation" id="ai-reasoning"></div>
            </div>
            <div class="meta-col">
                <div class="meta-item"><span class="meta-label">Vibe</span><span class="meta-value"
                        id="song-vibe">-</span></div>
                <div class="meta-item"><span class="meta-label">Tempo</span><span class="meta-value"
                        id="song-tempo">-</span></div>
            </div>
            <div class="player-panel">
                <button id="audio-toggle-btn" onclick="toggleAudio()" class="listen-btn">Play Audio</button>
                <div id="hidden-player-container"></div>
                <div id="listen-link-container">
                    <a id="listen-link" href="#" target="_blank" style="font-size: 12px; color: var(--text-muted);">Open
                        full video on YouTube</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let player;

    async function getRecommendation() {
        const promptInput = document.getElementById('user-prompt').value;
        const button = document.querySelector('.search-button');
        button.innerText = "Processing..."; button.disabled = true;

        // Hide link on search
        document.getElementById('listen-link-container').style.display = 'none';

        try {
            const response = await fetch(`/recommend?prompt=${encodeURIComponent(promptInput)}`);
            const data = await response.json();

            document.getElementById('song-title').innerText = data.title;
            document.getElementById('song-movie').innerText = data.movie;
            document.getElementById('song-vibe').innerText = data.vibe;
            document.getElementById('ai-reasoning').innerText = data.why;
            document.getElementById('listen-link').href = `https://www.youtube.com/watch?v=${data.youtube_id}`;
            document.getElementById('result-box').style.display = 'block';

            const btn = document.getElementById('audio-toggle-btn');
            btn.innerText = "Play Audio";
            btn.onclick = toggleAudio;

            if (player && typeof player.loadVideoById === 'function') {
                player.loadVideoById(data.youtube_id);
            } else {
                player = new YT.Player('hidden-player-container', {
                    height: '1', width: '1',
                    videoId: data.youtube_id,
                    events: { 'onStateChange': onPlayerStateChange, 'onError': onPlayerError }
                });
            }
        } catch (err) { alert("Error."); } finally { button.innerText = "Generate Vibe"; button.disabled = false; }
    }

    function onPlayerStateChange(event) {
        const btn = document.getElementById('audio-toggle-btn');
        // If it starts playing, we know it's NOT blocked. Show the link!
        if (event.data === 1) {
            btn.innerText = "Pause Audio";
            document.getElementById('listen-link-container').style.display = 'block';
        } else if (event.data === 2) {
            btn.innerText = "Play Audio";
        }
    }

    function onPlayerError(event) {
        const btn = document.getElementById('audio-toggle-btn');
        // Player is blocked. Change button to a link, hide extra link.
        btn.innerText = "Play on YouTube";
        btn.onclick = function () { window.open(document.getElementById('listen-link').href, '_blank'); };
        document.getElementById('listen-link-container').style.display = 'none';
    }

    function toggleAudio() {
        if (!player) return;
        (player.getPlayerState() === 1) ? player.pauseVideo() : player.playVideo();
    }
</script>
{% endblock %}
